services:
  db:
    image: pgvector/pgvector:pg17
    restart: always
    environment:
      POSTGRES_DB: moodmix
      POSTGRES_USER: moodmix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodmix"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    image: moodmix-api:${IMAGE_TAG:-latest}
    restart: always
    env_file: ./backend/.env.prod
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
