<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoodMix - Background Music Mixes to Focus and Relax</title>
    <meta name="description" content="Hand-picked YouTube music mixes crafted by real human curators, no AI-generated music. Find the perfect soundtrack for your work, study, or relaxation." />
    <link rel="canonical" href="https://moodmix.fm/" />
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MoodMix" />
    <meta property="og:title" content="MoodMix - Background Music Mixes to Focus and Relax" />
    <meta property="og:description" content="Hand-picked YouTube music mixes for work, study, sleep, and relaxation. Find the perfect soundtrack for your work, study, or relaxation." />
    <meta property="og:url" content="https://moodmix.fm/" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MoodMix - Background Music Mixes to Focus and Relax" />
    <meta name="twitter:description" content="Hand-picked YouTube music mixes for work, study, sleep, and relaxation. Find the perfect soundtrack for your work, study, or relaxation." />
    <!-- Structured data: site name for Google SERP -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "MoodMix",
        "url": "https://moodmix.fm/"
      }
    </script>
    <!-- Preconnect to YouTube thumbnails -->
    <link rel="preconnect" href="https://i.ytimg.com" />
    <!-- Self-hosted Roboto — inline @font-face for instant discovery -->
    <link rel="preload" href="/fonts/roboto-latin.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face {
        font-family: "Roboto";
        font-style: normal;
        font-weight: 400 700;
        font-display: optional;
        src: url("/fonts/roboto-latin.woff2") format("woff2");
      }
    </style>
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
