name: Test

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.test.yml"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.test.yml"
      - ".github/workflows/test.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: docker compose -f docker-compose.test.yml run --rm --build test
